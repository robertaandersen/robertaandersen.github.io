  <circle cx="35.0" cy="80" r="5" stroke="black" stroke-width="1" fill="rgb(256,256,256,125)" />
  <text x="35.0" y="82" font-size="0.35em" text-anchor="middle">5</text>
  <circle cx="47.5" cy="40" r="5" stroke="black" stroke-width="1" fill="rgb(256,256,256,125)" />
