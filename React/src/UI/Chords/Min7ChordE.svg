<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 83 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Min7 chord - E shape: 1@E/f1, ♭7@D/f1, ♭3@G/f1, 5@A/f3 -->
  <circle cx="10.0" cy="20" r="5" stroke="black" stroke-width="1" fill="rgb(256,256,256,125)" />
  <text x="10.0" y="22" font-size="0.35em" text-anchor="middle">1</text>
  <circle cx="35.0" cy="20" r="5" stroke="black" stroke-width="1" fill="rgb(256,256,256,125)" />
  <text x="35.0" y="22" font-size="0.35em" text-anchor="middle">♭7</text>
  <circle cx="47.5" cy="20" r="5" stroke="black" stroke-width="1" fill="rgb(256,256,256,125)" />
  <text x="47.5" y="22" font-size="0.35em" text-anchor="middle">♭3</text>
  <circle cx="22.5" cy="60" r="5" stroke="black" stroke-width="1" fill="rgb(256,256,256,125)" />
  <text x="22.5" y="62" font-size="0.35em" text-anchor="middle">5</text>
</svg>
